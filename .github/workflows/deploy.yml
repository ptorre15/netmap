name: Deploy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'deploy' to confirm"
        required: true
      release_version:
        description: "Optional explicit release version (default: 1.0.<run_number>+<short_sha>)"
        required: false
      ui_version:
        description: "Optional UI version to deploy alongside the server (e.g. 1.1.0). If omitted, the UI version in Public/ui-version.json is left unchanged."
        required: false

defaults:
  run:
    shell: bash

jobs:
  # ── Step 1: compile the release binary in CI (same toolchain as production) ──
  build:
    name: Build release binary
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'deploy' }}
    outputs:
      release_version: ${{ steps.release_version.outputs.release_version }}
    container:
      image: swift:6.0          # Ubuntu 22.04 base — binary compatible with Ubuntu 25.10 prod server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute release version
        id: release_version
        run: |
          SHORT_SHA="$(printf '%s' "$GITHUB_SHA" | cut -c1-7)"
          RELEASE_VERSION="${{ github.event.inputs.release_version }}"
          if [[ -z "$RELEASE_VERSION" ]]; then
            RELEASE_VERSION="1.0.${{ github.run_number }}+${SHORT_SHA}"
          fi
          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Apply release version to workspace
        run: |
          bash ./set-release-version.sh "${{ steps.release_version.outputs.release_version }}"
          if [[ -n "${{ github.event.inputs.ui_version }}" ]]; then
            bash ./set-ui-version.sh "${{ github.event.inputs.ui_version }}"
          fi

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-swift-6.0-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swift-6.0-spm-

      - name: Build (release)
        run: swift build -c release --static-swift-stdlib

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: netmap-server-binary
          path: .build/release/App
          retention-days: 1   # only needed for the deploy step below

  # ── Step 2: ship the pre-built artifact — no Swift needed on the server ──────
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: build
    environment: production   # requires approval from a designated reviewer
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Recreate release tree
        env:
          RELEASE_VERSION: ${{ needs.build.outputs.release_version }}
        run: |
          bash ./set-release-version.sh "$RELEASE_VERSION"
          if [[ -n "${{ github.event.inputs.ui_version }}" ]]; then
            bash ./set-ui-version.sh "${{ github.event.inputs.ui_version }}"
          fi

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: netmap-server-binary
          path: ./artifact/

      - name: Ensure deploy user can write to /opt/netmap/Public
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "sudo chown -R ${{ secrets.DEPLOY_USER }}:${{ secrets.DEPLOY_USER }} /opt/netmap/Public && sudo chmod -R u+w /opt/netmap/Public"

      - name: Deploy static files and binary
        run: |
          chmod +x ./artifact/App
          # Static files are synced directly; VERSION and the binary are staged
          # in /tmp so root-owned install paths are only modified via sudo.
          rsync -az --delete \
            Public/ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/netmap/Public/
          rsync -az \
            VERSION ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/netmap-version.new
          # Stage binary at /tmp for atomic swap during restart
          rsync -az \
            ./artifact/App ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/netmap-server.new

      - name: Restart service
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} bash <<'ENDSSH'
          set -euo pipefail
          sudo mv /tmp/netmap-version.new /opt/netmap/VERSION
          sudo chown -R netmap:netmap /opt/netmap/Public /opt/netmap/VERSION
          sudo mv /tmp/netmap-server.new /opt/netmap/bin/netmap-server
          sudo chmod 755 /opt/netmap/bin/netmap-server
          sudo chown netmap:netmap /opt/netmap/bin/netmap-server
          sudo systemctl daemon-reload
          sudo systemctl restart netmap-server
          ENDSSH

      - name: Verify public health endpoint
        env:
          NETMAP_DOMAIN: ${{ secrets.NETMAP_DOMAIN }}
        run: |
          sleep 10
          curl -sf --retry 8 --retry-delay 3 \
            "https://$NETMAP_DOMAIN/health" > /dev/null
