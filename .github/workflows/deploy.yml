name: Deploy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'deploy' to confirm"
        required: true

jobs:
  # ── Step 1: compile the release binary in CI (same toolchain as production) ──
  build:
    name: Build release binary
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'deploy' }}
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
    container:
      image: swift:6.0          # Ubuntu 22.04 base — binary-compatible with the prod server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bump patch version
        id: bump
        run: |
          ./bump-version.sh patch
          echo "new_version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-swift-6.0-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swift-6.0-spm-

      - name: Build (release)
        run: swift build -c release

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: netmap-server-binary
          path: .build/release/App
          retention-days: 1   # only needed for the deploy step below

  # ── Step 2: ship the pre-built artifact — no Swift needed on the server ──────
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: build
    environment: production   # requires approval from a designated reviewer
    permissions:
      contents: write   # required to push the version bump commit back to main
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Recreate bumped release tree
        run: |
          ./bump-version.sh patch

      - name: Open version bump PR
        env:
          GH_TOKEN: ${{ github.token }}
          NEW_VERSION: ${{ needs.build.outputs.new_version }}
        run: |
          BRANCH="ci/bump-version-${NEW_VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git commit -am "chore: bump version [skip ci]"
          git push --force-with-lease origin "$BRANCH"
          gh pr view "$BRANCH" >/dev/null 2>&1 || gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: bump version to ${NEW_VERSION}" \
            --body "Automated version bump created by the deploy workflow after building and deploying version ${NEW_VERSION}."
          git checkout "$GITHUB_SHA"

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: netmap-server-binary
          path: ./artifact/

      - name: Ensure deploy user can write to /opt/netmap/Public
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "sudo chown -R ${{ secrets.DEPLOY_USER }}:${{ secrets.DEPLOY_USER }} /opt/netmap/Public && sudo chmod -R u+w /opt/netmap/Public"

      - name: Deploy static files and binary
        run: |
          chmod +x ./artifact/App
          # Static files and VERSION (no full source tree needed on the server)
          rsync -az --delete \
            Public/ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/netmap/Public/
          rsync -az \
            VERSION ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/netmap/VERSION
          # Stage binary at /tmp for atomic swap during restart
          rsync -az \
            ./artifact/App ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/netmap-server.new

      - name: Restart service
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} bash <<'ENDSSH'
          set -euo pipefail
          sudo chown -R netmap:netmap /opt/netmap/Public /opt/netmap/VERSION
          sudo mv /tmp/netmap-server.new /opt/netmap/bin/netmap-server
          sudo chmod 755 /opt/netmap/bin/netmap-server
          sudo chown netmap:netmap /opt/netmap/bin/netmap-server
          sudo systemctl restart netmap-server
          sleep 3
          curl -sf --retry 5 --retry-delay 2 \
            "https://$NETMAP_DOMAIN/api/ping" > /dev/null \
            && echo "Service healthy." \
            || { sudo journalctl -u netmap-server -n 20; exit 1; }
          ENDSSH
        env:
          NETMAP_DOMAIN: ${{ secrets.NETMAP_DOMAIN }}
